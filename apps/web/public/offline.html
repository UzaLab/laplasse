<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Hors ligne — LaPlasse</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #fafafa 0%, #f1f5f9 100%);
      color: #0f172a;
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      text-align: center;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 { font-size: 1.35rem; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; }
    p { color: #64748b; line-height: 1.6; margin: 0 0 20px; font-size: 0.95rem; }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    a, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .primary { background: #0f172a; color: white; }
    .secondary { background: #f1f5f9; color: #0f172a; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icons/icon-192.png" alt="LaPlasse" width="64" height="64" />
    <h1>Vous êtes hors ligne</h1>
    <p>Certaines pages récemment visitées restent disponibles. Reconnectez-vous pour commander, réserver ou gérer vos livraisons.</p>
    <div class="actions">
      <a class="primary" href="/">Retour à l'accueil</a>
      <button class="secondary" type="button" onclick="location.reload()">Réessayer</button>
    </div>
  </div>
</body>
</html>
